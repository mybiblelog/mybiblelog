# Reset a password by typing the emailed code into the app, then signing in with
# the new password automatically. Independent of REQUIRE_EMAIL_VERIFICATION.
appId: com.mybiblelog.app
tags:
  - email-code
---
- runFlow: ../common/open-app.yaml
- tapOn:
    id: "tab.settings"
- tapOn: "Account"
- tapOn:
    id: "settings.login"
- extendedWaitUntil:
    visible:
      id: "login.forgot-password"
    timeout: 15000
- tapOn:
    id: "login.forgot-password"
- extendedWaitUntil:
    visible:
      id: "forgot-password.email"
    timeout: 15000
- tapOn:
    id: "forgot-password.email"
- inputText: ${E2E_EMAIL}
- hideKeyboard
- tapOn:
    id: "forgot-password.submit"
- extendedWaitUntil:
    visible:
      id: "forgot-password.code.code"
    timeout: 15000
- runScript:
    file: ../scripts/fetch-email-code.js
    env:
      EMAIL_TO: ${E2E_EMAIL}
      EMAIL_SUBJECT: "Reset Password"
- assertTrue: ${output.code != null}
- tapOn:
    id: "forgot-password.code.code"
# Typing the full code auto-submits it and reveals the new-password step.
- inputText: ${output.code}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "forgot-password.code.new-password"
    timeout: 15000
- tapOn:
    id: "forgot-password.code.new-password"
- inputText: "newpassword456"
- hideKeyboard
- tapOn:
    id: "forgot-password.code.confirm-password"
- inputText: "newpassword456"
- hideKeyboard
- tapOn:
    id: "forgot-password.code.submit"
# On success the app establishes a session and returns to Today.
- extendedWaitUntil:
    visible:
      id: "today.add-entry"
    timeout: 20000
