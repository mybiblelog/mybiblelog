# Smoke: create a tag and a note, filter the notes list, and verify filters
# clear when leaving the Notes tab (blur-reset behavior).
appId: com.mybiblelog.app
tags:
  - smoke
---
- runFlow: ../common/resume.yaml
- tapOn:
    id: "tab.notes"

# Create a tag.
- tapOn:
    id: "notes.tags"
- tapOn:
    id: "tags.new"
- tapOn:
    id: "tag-editor.label"
- inputText: "Focus"
# No hideKeyboard: it presses Back, which the editor's RN Modal treats as a
# dismiss (onRequestClose) and closes the sheet. Save lives in the sheet
# header, above the keyboard, so tap it directly.
- tapOn:
    id: "tag-editor.save"
- assertVisible: "Focus"
- back

# Create a note.
- tapOn:
    id: "notes.new"
- tapOn:
    id: "note-editor.content"
- inputText: "Maestro note"
# Save is in the modal header (above the keyboard); no hideKeyboard (Back
# would dismiss the modal).
- tapOn:
    id: "note-editor.save"
- assertVisible: "Maestro note"

# Filter by search text.
- tapOn:
    id: "notes.query"
- tapOn:
    id: "notes-query.search"
- inputText: "Maestro"
# Apply is in the sheet header (above the keyboard); no hideKeyboard (Back
# would dismiss the sheet).
- tapOn:
    id: "notes-query.apply"
- assertVisible: "Maestro note"
- assertVisible:
    id: "notes.reset"

# Leaving the tab clears the applied filters.
- tapOn:
    id: "tab.today"
- tapOn:
    id: "tab.notes"
- assertNotVisible:
    id: "notes.reset"
- assertVisible: "Maestro note"
