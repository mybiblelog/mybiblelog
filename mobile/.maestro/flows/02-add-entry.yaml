# Smoke: add a log entry through the structured book/chapter/verse picker.
appId: com.mybiblelog.app
tags:
  - smoke
---
- runFlow: ../common/resume.yaml
- tapOn:
    id: "today.add-entry"
- tapOn:
    id: "entry-editor.book"
- tapOn: "Exodus"
- tapOn:
    id: "entry-editor.start-chapter"
- tapOn: "1"
- tapOn:
    id: "entry-editor.start-verse"
- tapOn: "1"
- tapOn:
    id: "entry-editor.end-chapter"
- tapOn: "1"
- tapOn:
    id: "entry-editor.end-verse"
# Pick a verse near the top of the picker (no scroll): the options are a
# FlatList inside a bottom-docked sheet, and Maestro's scroll gesture swipes
# at screen-center — above the sheet — so it can't reach deep list items.
- tapOn: "5"
- tapOn:
    id: "entry-editor.save"
# Maestro anchors assertVisible text (full match), and a 1:1-5 range renders
# as "Exodus 1:1-5" (a whole chapter would collapse to just "Exodus 1").
- assertVisible: "Exodus 1:1-5"
